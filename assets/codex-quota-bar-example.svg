  <g filter="url(#shadow)"><rect x="260" y="204" width="400" height="108" rx="14" fill="#1e252e" fill-opacity=".9" stroke="#526477" stroke-opacity=".55"/><text x="284" y="232" fill="#f3f4f6" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">Codex Quota</text><text x="544" y="232" fill="#65d5a4" font-family="Segoe UI,Arial,sans-serif" font-size="12">Synced</text><text x="284" y="258" fill="#d8dce2" font-family="Segoe UI,Arial,sans-serif" font-size="12">5-hour　72%　·　Resets today 18:40</text><text x="284" y="280" fill="#d8dce2" font-family="Segoe UI,Arial,sans-serif" font-size="12">Weekly　34%　·　Resets Monday 09:00</text><rect x="284" y="290" width="72" height="22" rx="6" fill="#2f6ea8"/><text x="297" y="305" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">Sync now</text></g>
