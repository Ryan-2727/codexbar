<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Codex weekly quota bar example</title><desc id="desc">A dark soft-glass Codex weekly quota bar with an expanded details panel.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#101318"/><stop offset="1" stop-color="#202832"/></linearGradient><linearGradient id="glass" x1="0" x2="1"><stop stop-color="#1c222a" stop-opacity=".96"/><stop offset="1" stop-color="#151a21" stop-opacity=".92"/></linearGradient><filter id="shadow" x="-20%" y="-30%" width="140%" height="170%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".42"/></filter></defs>
  <rect width="920" height="300" rx="24" fill="url(#bg)"/><text x="48" y="54" fill="#aab4c1" font-family="Segoe UI,Arial,sans-serif" font-size="14">CodexQuotaBar · Weekly quota preview</text>
  <g filter="url(#shadow)"><rect x="365" y="84" width="190" height="86" rx="16" fill="url(#glass)" stroke="#60768b" stroke-opacity=".7"/><text x="388" y="130" fill="#eef1f4" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">Codex Quota</text><line x1="474" y1="108" x2="474" y2="146" stroke="#3e4854"/><circle cx="500" cy="117" r="5" fill="#f2ba55"/><text x="512" y="122" fill="#c3c9d2" font-family="Segoe UI,Arial,sans-serif" font-size="12">Weekly</text><text x="500" y="147" fill="#f2ba55" font-family="Segoe UI,Arial,sans-serif" font-size="22" font-weight="600">34%</text></g>
  <g filter="url(#shadow)"><rect x="300" y="194" width="320" height="76" rx="14" fill="#1e252e" fill-opacity=".9" stroke="#526477" stroke-opacity=".55"/><text x="324" y="222" fill="#f3f4f6" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">Codex Quota</text><text x="510" y="222" fill="#65d5a4" font-family="Segoe UI,Arial,sans-serif" font-size="12">Synced</text><text x="324" y="246" fill="#d8dce2" font-family="Segoe UI,Arial,sans-serif" font-size="12">Weekly　34%　·　Resets Monday 09:00</text></g>
</svg>
